<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Hotseat Manager</title>
<style>
  :root{
    --pitch:#0a6b3a; --line:#e8f5ec; --ink:#0c1410; --paper:#f2efe4;
    --gold:#f2c14e; --crowd:#1a2620; --red:#d23b3b; --green:#7dff9e;
    --mono:'Courier New',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--crowd);color:var(--paper);font-family:var(--mono);
    display:flex;justify-content:center;line-height:1.45;
    padding:16px;
    padding-bottom:calc(16px + env(safe-area-inset-bottom));
    min-height:100dvh;-webkit-text-size-adjust:100%;
    background-image:radial-gradient(circle at 50% 0%,#243029,#11190f 70%);
    background-attachment:fixed;
  }
  .cab{
    width:100%;max-width:900px;background:var(--ink);border:3px solid #000;border-radius:10px;
    box-shadow:0 0 0 3px var(--gold),0 18px 40px rgba(0,0,0,.6);overflow:hidden;
    align-self:flex-start;display:flex;flex-direction:column;
  }
  header{background:linear-gradient(180deg,#16241a,#0c1410);padding:14px 18px;border-bottom:2px solid var(--gold);display:flex;align-items:center;gap:12px;flex:0 0 auto}
  .cup{font-size:26px;filter:drop-shadow(0 2px 0 #0008)}
  header h1{font-size:16px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700}
  header .sub{font-size:11px;color:#9fb3a4;letter-spacing:1px;margin-top:2px}
  .screen{
    background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px),var(--pitch);
    min-height:460px;padding:20px;position:relative;
  }
  .screen::before{content:"";position:absolute;inset:14px;border:2px solid var(--line);opacity:.35;border-radius:4px;pointer-events:none}
  .panel{position:relative;z-index:1}
  h2{font-size:15px;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;color:var(--line)}
  p.lede{font-size:13px;color:#d7ecdd;margin-bottom:16px}
  label{display:block;font-size:12px;letter-spacing:1px;margin-bottom:6px;color:#cfe6d6}
  input[type=text]{width:100%;padding:10px;font-family:var(--mono);font-size:14px;background:#06371f;color:var(--paper);border:2px solid var(--line);border-radius:4px}
  input::placeholder{color:#7fae90}
  .grid{display:grid;gap:8px}
  .teams{grid-template-columns:repeat(auto-fill,minmax(168px,1fr));margin-top:6px;max-height:300px;overflow-y:auto;padding-right:4px}
  .gh{grid-column:1/-1;font-size:11px;color:var(--gold);letter-spacing:1px;margin-top:6px;border-bottom:1px solid #ffffff22;padding-bottom:2px}
  .team-btn{text-align:left;padding:8px 9px;font-family:var(--mono);font-size:11.5px;background:#0a4a2b;color:var(--paper);border:2px solid #1c6b42;border-radius:4px;cursor:pointer;transition:.12s;display:flex;justify-content:space-between;gap:6px}
  .team-btn:hover:not(:disabled){border-color:var(--gold);background:#0d5733}
  .team-btn.sel{background:var(--gold);color:var(--ink);border-color:#fff;font-weight:700}
  .team-btn:disabled{opacity:.32;cursor:not-allowed}
  .team-btn .pw{opacity:.7;font-size:10px}
  .team-btn .taken{font-size:9px;color:var(--gold)}
  .btn{display:inline-block;padding:11px 20px;font-family:var(--mono);font-size:13px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:4px;background:var(--gold);color:var(--ink);border:2px solid #fff;font-weight:700;transition:.12s}
  .btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 0 #0006}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
  .btn.ghost{background:transparent;color:var(--line);border-color:var(--line)}
  .btn.ghost:hover:not(:disabled){background:#ffffff14}
  .btn.sm{padding:7px 12px;font-size:11px}
  .btn.act{background:#0a4a2b;color:var(--paper);border-color:var(--gold)}
  .btn.act:hover:not(:disabled){background:#0d5733}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:16px}
  .spacer{flex:1}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{padding:8px 14px;font-family:var(--mono);font-size:12px;cursor:pointer;border-radius:4px;background:#0a4a2b;color:var(--paper);border:2px solid #1c6b42}
  .seg button.sel{background:var(--gold);color:var(--ink);border-color:#fff;font-weight:700}
  .plist{display:flex;flex-direction:column;gap:6px;margin-top:8px}
  .prow{display:flex;align-items:center;gap:8px}
  .prow .tag{font-size:11px;color:var(--gold);min-width:34px}
  .handoff{text-align:center;padding:30px 14px}
  .handoff .arrow{font-size:54px;animation:slide 1.1s ease-in-out infinite}
  @keyframes slide{50%{transform:translateX(10px)}}
  .handoff h2{font-size:20px;color:var(--gold);margin:10px 0 4px}
  .handoff .who{font-size:15px;color:var(--paper)}
  .handoff .ctx{font-size:12px;color:#9fb3a4;margin:8px 0 18px}
  .match-head{display:flex;justify-content:space-between;align-items:center;background:#06371f;border:2px solid var(--line);border-radius:6px;padding:12px 16px;margin-bottom:8px}
  .side{flex:1}.side.away{text-align:right}
  .flag{font-size:24px}.nm{font-size:13px;letter-spacing:1px;font-weight:700;margin-top:2px}
  .mgr{font-size:10px;color:var(--gold);margin-top:1px;min-height:12px}
  .score{font-size:30px;font-weight:700;color:var(--gold);padding:0 18px;min-width:96px;text-align:center}
  .clock{font-size:12px;color:#9fb3a4;text-align:center;margin:6px 0 8px;letter-spacing:2px}
  .feed{height:170px;overflow-y:auto;background:rgba(0,0,0,.28);border:2px solid #1c6b42;border-radius:6px;padding:10px 12px;font-size:12.5px}
  .feed .ev{padding:3px 0;border-bottom:1px dotted #ffffff14;animation:pop .25s}
  .feed .ev:last-child{border-bottom:none}
  .feed .min{color:var(--gold);display:inline-block;min-width:34px}
  .feed .goal{color:var(--green);font-weight:700}.feed .danger{color:#ffd27d}.feed .sub{color:#9fd0ff}
  .pen-board{display:inline-block;margin-left:6px;font-weight:700;color:var(--gold);letter-spacing:1px}
  .statbox{margin-top:12px;background:#06371f;border:2px solid #1c6b42;border-radius:6px;padding:10px 14px}
  .sttitle{font-size:12px;color:var(--gold);letter-spacing:1px;text-align:center;margin-bottom:8px;font-weight:700}
  .srow{display:flex;align-items:center;font-size:12px;padding:3px 0}
  .srow .sl{width:46px;text-align:left;color:var(--green);font-weight:700}
  .srow .sm{flex:1;text-align:center;color:#cfe6d6;font-size:11px;letter-spacing:1px}
  .srow .sr{width:46px;text-align:right;color:var(--green);font-weight:700}
  @keyframes pop{from{opacity:0;transform:translateX(-4px)}to{opacity:1}}
  .matchctl{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
  .pill{font-size:10px;color:#9fb3a4;letter-spacing:1px;border:1px solid #1c6b42;border-radius:20px;padding:3px 10px}
  .groups{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
  .gcard{background:#06371f;border:2px solid #1c6b42;border-radius:6px;padding:10px}
  .gcard h3{font-size:12px;color:var(--gold);letter-spacing:1px;margin-bottom:6px}
  table{width:100%;border-collapse:collapse;font-size:11px}
  th,td{text-align:left;padding:2px 3px}
  th{color:#9fb3a4;font-weight:400;border-bottom:1px solid #ffffff22}
  td.n{text-align:center;width:18px}
  tr.hum td{color:var(--gold);font-weight:700}
  tr.qual td:first-child::before{content:"▸ ";color:var(--green)}
  .ko{display:grid;gap:7px;max-height:340px;overflow-y:auto;padding-right:4px}
  .tie{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;background:#06371f;border:2px solid #1c6b42;border-radius:5px;padding:7px 11px}
  .tie .res{color:var(--gold);font-weight:700}
  .tie.hum{box-shadow:inset 0 0 0 2px var(--gold)}
  .tie.clash{box-shadow:inset 0 0 0 2px var(--red);border-color:var(--red)}
  .tie .badge{font-size:9px;color:var(--red);letter-spacing:1px}
  .tac{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0}
  .tac button{padding:12px 8px;font-family:var(--mono);font-size:12px;cursor:pointer;border-radius:5px;background:#0a4a2b;color:var(--paper);border:2px solid #1c6b42}
  .tac button.sel{background:var(--gold);color:var(--ink);border-color:#fff;font-weight:700}
  .tac small{display:block;opacity:.7;font-size:10px;margin-top:3px}
  .qbox{background:#06371f;border:2px solid var(--gold);border-radius:6px;padding:12px;margin:12px 0}
  .qbox .q{font-size:12.5px;color:var(--paper);margin-bottom:10px}
  .qbox .opts{display:flex;flex-direction:column;gap:6px}
  .qbox .opts button{text-align:left;padding:9px 10px;font-family:var(--mono);font-size:12px;cursor:pointer;border-radius:4px;background:#0a4a2b;color:var(--paper);border:2px solid #1c6b42}
  .qbox .opts button:hover{border-color:var(--gold)}
  .qfeedback{margin-top:10px;font-size:12px;color:#cfe6d6;background:rgba(0,0,0,.25);border-radius:5px;padding:8px 10px;animation:pop .25s}
  #qbanner{display:flex;flex-direction:column;gap:4px;margin:0 0 8px}
  .qbanrow{display:flex;flex-wrap:wrap;align-items:baseline;gap:6px;font-size:11.5px;border-radius:5px;padding:6px 10px;background:rgba(0,0,0,.28);border-left:3px solid #9fb3a4;animation:pop .25s}
  .qbanrow.up{border-left-color:var(--green)}
  .qbanrow.down{border-left-color:#ff8a8a}
  .qbtag{font-weight:700;letter-spacing:1px;color:var(--gold)}
  .qbanrow.up .qbtag{color:var(--green)}
  .qbanrow.down .qbtag{color:#ff8a8a}
  .qbtext{color:#cfe6d6}
  .qfx{font-weight:700;letter-spacing:1px;margin-right:6px}
  .qfx.up{color:var(--green)} .qfx.down{color:#ffb1b1}
  .subpick{display:flex;flex-direction:column;gap:6px;margin:10px 0}
  .subpick button{text-align:left;padding:8px 10px;font-family:var(--mono);font-size:12px;cursor:pointer;border-radius:4px;background:#0a4a2b;color:var(--paper);border:2px solid #1c6b42}
  .subpick button:hover:not(:disabled){border-color:var(--gold)}
  .subpick button:disabled{opacity:.4;cursor:not-allowed}
  .champ{text-align:center;padding:24px 10px}
  .champ .big{font-size:48px;animation:bob 1.6s ease-in-out infinite}
  @keyframes bob{50%{transform:translateY(-8px)}}
  .champ h2{font-size:22px;color:var(--gold);margin:10px 0}
  .standings{margin-top:14px;font-size:12px;text-align:left;display:inline-block}
  .roundup{display:flex;flex-direction:column;gap:4px;max-height:320px;overflow-y:auto;padding-right:4px}
  .rurow{display:flex;align-items:center;gap:6px;background:#06371f;border:1px solid #1c6b42;border-radius:5px;padding:6px 8px;font-size:11.5px}
  .rurow.up{border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold)}
  .rugrp{min-width:18px;text-align:center;color:#9fb3a4;font-size:10px;font-weight:700}
  .ruteam{flex:1;text-align:right;color:var(--paper)}
  .ruteam.ra{text-align:left}
  .ruscore{font-weight:700;color:var(--gold);min-width:48px;text-align:center}
  .rutags{min-width:84px;text-align:right;display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap}
  .rupset{font-size:8px;color:var(--ink);background:var(--gold);border-radius:3px;padding:1px 4px;letter-spacing:1px;font-weight:700}
  .rmine{font-size:8px;color:var(--green);border:1px solid var(--green);border-radius:3px;padding:1px 4px;letter-spacing:1px}
  @media (max-width:820px){.roundup{max-height:none}}
  .lbtitle{font-size:12px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin:16px 0 6px;font-weight:700}
  .leaderboard{display:flex;flex-direction:column;gap:4px;max-width:460px;margin:0 auto;text-align:left}
  .lbrow{display:flex;align-items:center;gap:8px;background:#06371f;border:1px solid #1c6b42;border-radius:5px;padding:6px 10px;font-size:12px}
  .lbrow.champ-row{border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold)}
  .lbpos{min-width:26px;text-align:center;font-weight:700;color:var(--gold)}
  .lbname{flex:1;color:var(--paper)}
  .lbnat{color:#9fb3a4;font-size:10px}
  .lbround{color:var(--green);font-size:11px;font-weight:700;white-space:nowrap}
  .standings div{padding:2px 0}
  .out{color:var(--red);font-weight:700}
  footer{padding:8px 18px;font-size:10px;color:#5d7065;text-align:center;border-top:1px solid #000;background:#0c1410;flex:0 0 auto}
  .toast{font-size:12px;color:var(--gold);margin-top:10px;min-height:16px}
  /* Desktop / laptop: fit the whole game inside the window, scroll inside the screen only */
  @media (min-width:821px) and (min-height:560px){
    body{overflow:hidden;align-items:center}
    .cab{align-self:center;height:94dvh;max-height:900px}
    .screen{flex:1 1 auto;min-height:0;overflow-y:auto}
    .teams{max-height:none;overflow-y:visible;padding-right:0}
    .ko{max-height:none;overflow-y:visible;padding-right:0}
  }
  @media (max-width:820px){
    .teams{max-height:none;overflow-y:visible;padding-right:0}
    .ko{max-height:none;overflow-y:visible;padding-right:0}
    .feed{height:150px}
  }
  @media (max-width:520px){.score{font-size:24px;min-width:72px}.tac{grid-template-columns:1fr}}
</style>
</head>

/* ============ REAL 2026 FIELD ============ */
/* [name, flag, FIFA rank] — power derived from rank */
const RAW=[

 ["Uzbekistan","🇺🇿",50],["Qatar","🇶🇦",56],["Iraq","🇮🇶",57],["South Africa","🇿🇦",60],

// pick a scorer for a team: usually a real star, sometimes a generic squad name
const scorer=(team)=>{
  const stars=team&&STARS[team];
  if(stars && Math.random()<0.7) return rnd(stars);
  return rnd(SURNAMES);
};
// record a goal for the Golden Boot (real goals only, not penalties)
function recordGoal(player,team){
  if(!S.boot)S.boot={};
  const key=player+"||"+team;
  S.boot[key]=(S.boot[key]||0)+1;
}
// credit N goals to random scorers of a team (used for instantly-simmed CPU matches)
function creditGoals(teamName,n){
  for(let i=0;i<n;i++) recordGoal(scorer(teamName),teamName);
}

/* ============ SAVE / RESUME (between rounds) ============ */
// We snapshot only the data needed to resume at the start of a round.
function makeSaveCode(){
  const snap={
    v:1, mode:S.mode, np:S.np, chaos:S.chaos,
    players:S.players, mgrOf:S.mgrOf,
    humanNations:[...(S.humanNations||[])],
    groups:S.groups, groupLetters:S.groupLetters,
    stage:S.stage, gRound:S.gRound,
    bracket:S.bracket, round:S.round,
    survivors:[...(S.survivors||[])],
    exit:S.exit||{}, boot:S.boot||{},
  };
  // base64 of JSON, URL-safe-ish, with a friendly prefix
  return "WC26-"+btoa(unescape(encodeURIComponent(JSON.stringify(snap))));
}
function loadSaveCode(code){
  try{
    const raw=code.trim().replace(/^WC26-/,"");
    const snap=JSON.parse(decodeURIComponent(escape(atob(raw))));
    if(!snap||snap.v!==1) return null;
    S={
      mode:snap.mode,np:snap.np,chaos:snap.chaos||1.0,
      players:snap.players,mgrOf:snap.mgrOf,
      humanNations:new Set(snap.humanNations),
      groups:snap.groups,groupLetters:snap.groupLetters,
      stage:snap.stage,gRound:snap.gRound,
      bracket:snap.bracket,round:snap.round,
      survivors:new Set(snap.survivors),
      exit:snap.exit||{},boot:snap.boot||{},
    };
    return true;
  }catch(e){return null;}
}
// Save panel shown over the current screen

function mk(name){const d=NAT[name];return{name,flag:d.flag,pw:d.pw,pts:0,gf:0,ga:0,pl:0,form:[]};}
const isHuman=n=>S.humanNations.has(n);
const mgrName=n=>S.mgrOf[n];

const GROUP_FIX=[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]];

function renderGroups(msg){
  let html=`<h2>${msg||"Group Stage"}</h2><div class="groups">`;
  S.groups.forEach((g,gi)=>{
    const sorted=[...g].sort(cmp);
    html+=`<div class="gcard"><h3>Group ${S.groupLetters[gi]}</h3><table><tr><th>Team</th><th>P</th><th>Pts</th><th>Form</th></tr>`;
    sorted.forEach((t,r)=>{
      const cls=[isHuman(t.name)?"hum":"",r<2&&t.pl>0?"qual":""].join(" ");
      const tag=isHuman(t.name)?` <span style="font-size:9px">(${mgrName(t.name)})</span>`:"";
      html+=`<tr class="${cls}"><td>${t.flag} ${t.name}${tag}</td><td class="n">${t.pl}</td><td class="n">${t.pts}</td><td class="n">${formDots(t.form)}</td></tr>`;
    });
    html+=`</table></div>`;
  });
  html+=`</div><div class="row">`;
  if(S.gRound<3) html+=`<button class="btn" id="next">Play Matchday ${S.gRound+1} ▸</button>`;

  if(S.gRound<3)$("next").onclick=()=>runMatchday(); else $("ko").onclick=()=>startKnockout();
  $("save").onclick=()=>showSavePanel(()=>renderGroups(msg));
}
function cmp(a,b){return b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf;}

async function runMatchday(){
  const fix=GROUP_FIX.slice(S.gRound*2,S.gRound*2+2);
  const results=[]; // {gi, home, away, hs, as, human}
  const liveQueue=[];
  S.groups.forEach((g,gi)=>fix.forEach(pair=>{
    const A=g[pair[0]],B=g[pair[1]];
    if(A&&B&&(isHuman(A.name)||isHuman(B.name))) liveQueue.push({gi,pair});
  }));
  // play human matches live; capture their score from the table delta
  for(const m of liveQueue){
    const g=S.groups[m.gi];
    const A=g[m.pair[0]],B=g[m.pair[1]];
    const beforeA=A.gf, beforeB=B.gf;
    await liveMatch(A,B,{group:g,roundName:"Group "+S.groupLetters[m.gi]});
    results.push({gi:m.gi,home:A,away:B,hs:A.gf-beforeA,as:B.gf-beforeB,human:true});
  }
  // sim CPU matches and capture
  S.groups.forEach((g,gi)=>fix.forEach(pair=>{
    const A=g[pair[0]],B=g[pair[1]];if(!A||!B)return;
    if(isHuman(A.name)||isHuman(B.name))return;
    const r=quickScore(A.pw*(1+formNudge(A)),B.pw*(1+formNudge(B)));apply(A,B,r[0],r[1]);creditGoals(A.name,r[0]);creditGoals(B.name,r[1]);
    results.push({gi:gi,home:A,away:B,hs:r[0],as:r[1],human:false});
  }));
  S.gRound++;
  roundup(results,()=>renderGroups(`Group Stage — ${S.gRound} of 3 matchdays done`));
}
// flag an upset: a clearly weaker side avoids defeat against a much stronger one
function isUpset(home,away,hs,as){
  const gap=Math.abs(home.pw-away.pw);
  if(gap<8) return false; // need a real quality gap
  const strongerIsHome=home.pw>away.pw;
  const strongerWon = strongerIsHome ? hs>as : as>hs;
  return !strongerWon; // stronger team failed to win = upset (loss or draw)
}
function roundup(results,done){
  // order: humans first, then by combined goals (livelier games up top)
  const ordered=[...results].sort((a,b)=>(b.human-a.human)||((b.hs+b.as)-(a.hs+a.as)));
  let rows=ordered.map(r=>{
    const up=isUpset(r.home,r.away,r.hs,r.as);
    const yourTag=r.human?'<span class="rmine">YOUR GAME</span>':'';
    const upTag=up?'<span class="rupset">UPSET</span>':'';
    return `<div class="rurow ${up?'up':''}">
      <span class="rugrp">${S.groupLetters[r.gi]}</span>
      <span class="ruteam">${r.home.flag} ${r.home.name}</span>
      <span class="ruscore">${r.hs} – ${r.as}</span>
      <span class="ruteam ra">${r.away.name} ${r.away.flag}</span>
      <span class="rutags">${upTag}${yourTag}</span></div>`;
  }).join("");
  app.innerHTML=`<h2>Matchday ${S.gRound} — Results Round-up</h2>
    <p class="lede">Every result from across the twelve groups. Shocks are flagged.</p>
    <div class="roundup">${rows}</div>
    <div class="row"><div class="spacer"></div><button class="btn" id="ru">See the Tables ▸</button></div>`;
  $("ru").onclick=done;
}
function apply(t1,t2,s1,s2){t1.pl++;t2.pl++;t1.gf+=s1;t1.ga+=s2;t2.gf+=s2;t2.ga+=s1;
  if(s1>s2){t1.pts+=3;pushForm(t1,'W');pushForm(t2,'L');}
  else if(s2>s1){t2.pts+=3;pushForm(t2,'W');pushForm(t1,'L');}
  else{t1.pts++;t2.pts++;pushForm(t1,'D');pushForm(t2,'D');}}
function pushForm(t,r){if(!t.form)t.form=[];t.form.push(r);if(t.form.length>5)t.form.shift();}
// render last up-to-3 results as small coloured letters
function formDots(form){
  if(!form||!form.length)return '<span style="color:#5d7065">–</span>';
  return form.slice(-3).map(r=>{
    const col=r==='W'?'var(--green)':r==='L'?'#ff8a8a':'#d8c98a';
    return `<span style="color:${col};font-weight:700">${r}</span>`;
  }).join('');
}
// short note about a team's momentum for the pre-match screen
function streakNote(t){
  if(!t||!t.form||t.form.length<2)return '';
  const l=t.form.slice(-2).join("");
  if(l==="WW")return ' <span style="color:var(--green)">On a hot streak — the players are flying.</span>';
  if(l==="LL")return ' <span style="color:#ff8a8a">Two defeats running — confidence is low.</span>';
  return '';
}
// momentum: 2+ wins in a row gives a small lift, 2+ losses a small dip
function formNudge(t){
  if(!t||!t.form||t.form.length<2)return 0;
  const last2=t.form.slice(-2).join("");
  if(last2==="WW")return 0.03;
  if(last2==="LL")return -0.03;
  return 0;
}
// chaos compresses the gap between teams (higher chaos -> more upsets).
// returns an adjusted ratio of p1 over p2.
function chaosRatio(p1,p2){
  const c=(S&&S.chaos)?S.chaos:1.0;
  // exponent <1 pulls ratio toward 1 (parity); we map chaos 0.7..1.9 -> exp 1.15..0.55
  const exp=1.0/Math.max(0.5,c);   // c=1 ->1.0, c=1.4->~0.71, c=0.7->~1.43
  return Math.pow(p1/p2,exp);
}
function quickScore(p1,p2){const r=chaosRatio(p1,p2);const e1=1.45*Math.pow(r,1.6),e2=1.45*Math.pow(1/r,1.6);return[pois(e1),pois(e2)];}
function pois(l){let L=Math.exp(-l),k=0,p=1;do{k++;p*=Math.random();}while(p>L);return k-1;}

/* ============ LIVE MATCH with tactics, HT switch, subs ============ */
function tacticsScreen(ctrl,ourTeam,oppTeam,roundName,allowQ,onDone){
  let qHtml="";
  if(allowQ && Math.random()<0.6){ctrl._q=rnd(QUESTIONS);
    qHtml=`<div class="qbox"><div class="q">📋 Manager's question — ${ctrl._q.q}</div>
      <div class="opts" id="opts">${ctrl._q.opts.map((o,k)=>`<button data-k="${k}">${o[0]}</button>`).join("")}</div></div>`;
  } else ctrl._q=null;
  app.innerHTML=`<h2>${roundName} · ${ourTeam.flag} ${ourTeam.name} v ${oppTeam.name} ${oppTeam.flag}</h2>
    <p class="lede">${ctrl.name}, you manage <strong style="color:var(--gold)">${ourTeam.name}</strong>. Set your first-half approach.${streakNote(ourTeam)}</p>
    ${qHtml}
    <div class="tac" id="tac">${Object.entries(FORM).map(([k,v])=>`<button data-f="${k}" class="${ctrl._form===k?'sel':''}">${v.lbl}<small>${v.sub}</small></button>`).join("")}</div>
    <div class="row"><button class="btn" id="kick" ${ctrl._q?'disabled':''}>Kick Off ▸</button></div>`;
  document.querySelectorAll(".tac button").forEach(b=>b.onclick=()=>{document.querySelectorAll(".tac button").forEach(x=>x.classList.remove("sel"));b.classList.add("sel");ctrl._form=b.dataset.f;});
  if(ctrl._q)document.querySelectorAll("#opts button").forEach(b=>b.onclick=()=>{
    document.querySelectorAll("#opts button").forEach(x=>x.style.borderColor="#1c6b42");b.style.borderColor="var(--gold)";
    const opt=ctrl._q.opts[+b.dataset.k];
    ctrl._qbonus=opt[1];
    ctrl._qpending=opt; // remember the choice so we can reveal its effect at kick-off
    $("kick").disabled=false;});
  $("kick").onclick=onDone;
}

// half-time tactical switch for a human controller

async function liveMatch(home,away,opts){
  const {group,roundName}=opts;
  const homeCtrl=isHuman(home.name)?playerByNation(home.name):null;
  const awayCtrl=isHuman(away.name)?playerByNation(away.name):null;
  [homeCtrl,awayCtrl].forEach(c=>{if(c){c._form=c._form||"balanced";c._qbonus=0;c._subs=3;c._subBoost=0;}});
  const allowQ = group ? (S.gRound>=1) : true;

  if(homeCtrl) await new Promise(res=>{const b=()=>tacticsScreen(homeCtrl,home,away,roundName,allowQ,res);
    S.mode==="hotseat"?handoff(homeCtrl.name,`Set tactics: ${home.name} v ${away.name}`,b):b();});
  if(awayCtrl) await new Promise(res=>{const b=()=>tacticsScreen(awayCtrl,away,home,roundName,allowQ,res);
    S.mode==="hotseat"?handoff(awayCtrl.name,`Set tactics: ${away.name} v ${home.name}`,b):b();});

  if(S.mode==="hotseat" && (homeCtrl||awayCtrl))
    await new Promise(res=>handoff("everyone","Match is ready — kick off!",res));

  return await commentary(home,away,homeCtrl,awayCtrl,group,opts);
}

async function commentary(home,away,homeCtrl,awayCtrl,group,opts){
  let hs=0,as=0;
  const hq=homeCtrl?homeCtrl._qbonus:0, aq=awayCtrl?awayCtrl._qbonus:0;
  const stat={hShots:0,aShots:0,hOn:0,aOn:0}; // shots and shots-on-target for post-match summary
  // log a goal: update Golden Boot and shot stats, return the scorer name
  const logGoal=(team,isHome)=>{
    const name=scorer(team.name);
    recordGoal(name,team.name);
    if(isHome){stat.hShots++;stat.hOn++;} else {stat.aShots++;stat.aOn++;}
    return name;
  };
  app.innerHTML=`
    <div class="match-head">
      <div class="side"><div class="flag">${home.flag}</div><div class="nm">${home.name}</div><div class="mgr">${isHuman(home.name)?mgrName(home.name):'CPU'}</div></div>
      <div class="score" id="sc">0 – 0</div>
      <div class="side away"><div class="flag">${away.flag}</div><div class="nm">${away.name}</div><div class="mgr">${isHuman(away.name)?mgrName(away.name):'CPU'}</div></div>
    </div>
    <div class="clock" id="clk">KICK OFF</div>
    <div id="qbanner"></div>
    <div class="feed" id="feed"></div>
    <div class="matchctl">
      <span class="pill" id="hsubs">${homeCtrl?home.name+' subs: '+homeCtrl._subs:''}</span>
      <span class="pill" id="asubs">${awayCtrl?away.name+' subs: '+awayCtrl._subs:''}</span>
      <div class="spacer"></div>
      <button class="btn ghost sm" id="subBtn" style="display:none">Make a Sub</button>
      <button class="btn ghost sm" id="skip">Skip ▸</button>
    </div>`;
  const feedEl=$("feed"),scEl=$("sc"),clkEl=$("clk");
  let skip=false;$("skip").onclick=()=>skip=true;
  const push=(min,txt,cls="")=>{const d=document.createElement("div");d.className="ev "+cls;
    d.innerHTML=`<span class="min">${min}'</span>${txt}`;feedEl.appendChild(d);feedEl.scrollTop=feedEl.scrollHeight;};

  // reveal each human manager's pre-match question outcome now that the game has started
  const qbanner=$("qbanner");
  const revealChoice=(ctrl,team)=>{
    if(!ctrl||!ctrl._qpending)return;
    const opt=ctrl._qpending;
    const sign=opt[1]>0?'▲ BOOST':opt[1]<0?'▼ RISK':'– NEUTRAL';
    const kind=opt[1]>0?'up':opt[1]<0?'down':'';
    // persistent banner pinned to the match screen
    const row=document.createElement("div");
    row.className="qbanrow "+kind;
    row.innerHTML=`<span class="qbtag">${team.flag} ${team.name} · ${sign}</span><span class="qbtext">${opt[2]}</span>`;
    qbanner.appendChild(row);
    // also log it in the commentary feed
    push("0",`<span class="qfx ${kind}">${team.name}: ${sign}</span> — ${opt[2]}`,opt[1]>0?'goal':opt[1]<0?'danger':'');
    ctrl._qpending=null; // consumed
  };
  revealChoice(homeCtrl,home);
  revealChoice(awayCtrl,away);

  // sub handling: in hotseat we can only meaningfully offer subs to one device-holder at a time;
  // we offer to BOTH human controllers via a single button that the current holder uses.
  // To keep it fair & simple, the sub button applies to whichever human teams still have subs,
  // prompting which team when both are human.
  let paused=false;
  const subBtn=$("subBtn");
  function refreshSubs(){
    if(homeCtrl)$("hsubs").textContent=`${home.name} subs: ${homeCtrl._subs}`;
    if(awayCtrl)$("asubs").textContent=`${away.name} subs: ${awayCtrl._subs}`;
    const anyLeft=(homeCtrl&&homeCtrl._subs>0)||(awayCtrl&&awayCtrl._subs>0);
    subBtn.style.display=anyLeft?'inline-block':'none';
  }
  refreshSubs();
  subBtn.onclick=async()=>{
    paused=true;
    // choose team if both human
    let target=null;
    const opts2=[];
    if(homeCtrl&&homeCtrl._subs>0)opts2.push([home,homeCtrl]);
    if(awayCtrl&&awayCtrl._subs>0)opts2.push([away,awayCtrl]);
    if(opts2.length===1)target=opts2[0];
    const doSub=(pair)=>{
      const[team,ctrl]=pair;
      const fresh=scorer(team.name);
      ctrl._subs--;ctrl._subBoost+=0.06; // fresh legs nudge attacking output
      push(curMin,`<span class="sub">🔄 ${team.name} sub — ${fresh} on, fresh legs.</span>`,"sub");
      refreshSubs();paused=false;
    };
    if(target){doSub(target);}
    else{
      // ask which team
      const overlay=document.createElement("div");
      overlay.className="subpick";
      overlay.innerHTML=opts2.map((o,i)=>`<button data-i="${i}">Sub for ${o[0].flag} ${o[0].name} (${o[1]._subs} left)</button>`).join("")
        +`<button data-cancel="1" class="btn ghost sm">Cancel</button>`;
      app.querySelector(".matchctl").after(overlay);
      overlay.querySelectorAll("button").forEach(b=>b.onclick=()=>{
        if(b.dataset.cancel){overlay.remove();paused=false;return;}
        doSub(opts2[+b.dataset.i]);overlay.remove();
      });
    }
  };

  let curMin=0;
  const half = async (from,to,htDone)=>{
    for(let m=from;m<=to;m++){
      curMin=m;clkEl.textContent=`${m}'`;
      // recompute xg each minute from current tactics + bonuses (so HT switch & subs matter live)
      const hf=homeCtrl?FORM[homeCtrl._form]:FORM.balanced;
      const af=awayCtrl?FORM[awayCtrl._form]:FORM.balanced;
      const hp=home.pw*(1+hq+formNudge(home)+(homeCtrl?homeCtrl._subBoost:0));
      const ap=away.pw*(1+aq+formNudge(away)+(awayCtrl?awayCtrl._subBoost:0));
      const hxg=1.4*Math.pow(chaosRatio(hp,ap),1.5)*hf.atk*af.def*1.06;
      const axg=1.4*Math.pow(chaosRatio(ap,hp),1.5)*af.atk*hf.def;
      if(Math.random()<hxg/90){hs++;scEl.textContent=`${hs} – ${as}`;push(m,`<span class="goal">⚽ GOAL! ${home.name}</span> — ${logGoal(home,true)} ${rnd(COMM.goal)}`,"goal");}
      else if(Math.random()<axg/90){as++;scEl.textContent=`${hs} – ${as}`;push(m,`<span class="goal">⚽ GOAL! ${away.name}</span> — ${logGoal(away,false)} ${rnd(COMM.goal)}`,"goal");}
      else if(Math.random()<0.10){const t=Math.random()<hxg/(hxg+axg)?home:away;if(t===home){stat.hShots++;stat.hOn++;}else{stat.aShots++;stat.aOn++;}push(m,`<span class="danger">${t.name}</span> ${rnd(COMM.chance)}`,"danger");}
      else if(Math.random()<0.16){const t=Math.random()<.5?home:away;if(Math.random()<0.4){t===home?stat.hShots++:stat.aShots++;}push(m,`${t.name} ${rnd(COMM.mid)}`);}
      // honour pause for subs
      while(paused) await sleep(60);
      if(!skip) await sleep(m%5===0?180:100);
    }
  };

  await half(1,45);
  // HALF TIME switch for human controllers
  if(!skip && (homeCtrl||awayCtrl)){
    clkEl.textContent="HALF TIME";
    if(homeCtrl) await new Promise(res=>{const b=()=>halftimeScreen(homeCtrl,home,away,hs,as,res);
      S.mode==="hotseat"?handoff(homeCtrl.name,"Half-time team talk",b):b();});
    if(awayCtrl) await new Promise(res=>{const b=()=>halftimeScreen(awayCtrl,away,home,as,hs,res);
      S.mode==="hotseat"?handoff(awayCtrl.name,"Half-time team talk",b):b();});
    // rebuild the match view (it was replaced by HT screens)
    rebuildMatchView();
    function rebuildMatchView(){
      app.innerHTML=`
        <div class="match-head">
          <div class="side"><div class="flag">${home.flag}</div><div class="nm">${home.name}</div><div class="mgr">${isHuman(home.name)?mgrName(home.name):'CPU'}</div></div>
          <div class="score" id="sc">${hs} – ${as}</div>
          <div class="side away"><div class="flag">${away.flag}</div><div class="nm">${away.name}</div><div class="mgr">${isHuman(away.name)?mgrName(away.name):'CPU'}</div></div>
        </div>
        <div class="clock" id="clk">SECOND HALF</div>
        <div class="feed" id="feed"></div>
        <div class="matchctl">
          <span class="pill" id="hsubs">${homeCtrl?home.name+' subs: '+homeCtrl._subs:''}</span>
          <span class="pill" id="asubs">${awayCtrl?away.name+' subs: '+awayCtrl._subs:''}</span>
          <div class="spacer"></div>
          <button class="btn ghost sm" id="subBtn">Make a Sub</button>
          <button class="btn ghost sm" id="skip">Skip ▸</button>
        </div>`;
    }
    // re-bind refs after rebuild
    return await secondHalf();
  }
  return await secondHalf();

  async function secondHalf(){
    // rebind (view may have been rebuilt)
    const feedEl=$("feed"),scEl=$("sc"),clkEl=$("clk"),subBtn=$("subBtn"),skipBtn=$("skip");
    if(skipBtn)skipBtn.onclick=()=>skip=true;
    const push2=(min,txt,cls="")=>{const d=document.createElement("div");d.className="ev "+cls;
      d.innerHTML=`<span class="min">${min}'</span>${txt}`;feedEl.appendChild(d);feedEl.scrollTop=feedEl.scrollHeight;};
    function refreshSubs2(){
      if(homeCtrl&&$("hsubs"))$("hsubs").textContent=`${home.name} subs: ${homeCtrl._subs}`;
      if(awayCtrl&&$("asubs"))$("asubs").textContent=`${away.name} subs: ${awayCtrl._subs}`;
      const anyLeft=(homeCtrl&&homeCtrl._subs>0)||(awayCtrl&&awayCtrl._subs>0);
      if(subBtn)subBtn.style.display=anyLeft?'inline-block':'none';
    }
    refreshSubs2();
    if(subBtn)subBtn.onclick=()=>{
      paused=true;
      const opts2=[];
      if(homeCtrl&&homeCtrl._subs>0)opts2.push([home,homeCtrl]);
      if(awayCtrl&&awayCtrl._subs>0)opts2.push([away,awayCtrl]);
      const doSub=(pair)=>{const[team,ctrl]=pair;ctrl._subs--;ctrl._subBoost+=0.06;
        push2(curMin,`<span class="sub">🔄 ${team.name} sub — ${scorer(team.name)} on, fresh legs.</span>`,"sub");refreshSubs2();paused=false;};
      if(opts2.length===1){doSub(opts2[0]);return;}
      const overlay=document.createElement("div");overlay.className="subpick";
      overlay.innerHTML=opts2.map((o,i)=>`<button data-i="${i}">Sub for ${o[0].flag} ${o[0].name} (${o[1]._subs} left)</button>`).join("")+`<button data-cancel="1" class="btn ghost sm">Cancel</button>`;
      app.querySelector(".matchctl").after(overlay);
      overlay.querySelectorAll("button").forEach(b=>b.onclick=()=>{if(b.dataset.cancel){overlay.remove();paused=false;return;}doSub(opts2[+b.dataset.i]);overlay.remove();});
    };
    for(let m=46;m<=90;m++){
      curMin=m;if($("clk"))$("clk").textContent=`${m}'`;
      const hf=homeCtrl?FORM[homeCtrl._form]:FORM.balanced;
      const af=awayCtrl?FORM[awayCtrl._form]:FORM.balanced;
      const hp=home.pw*(1+hq+formNudge(home)+(homeCtrl?homeCtrl._subBoost:0));
      const ap=away.pw*(1+aq+formNudge(away)+(awayCtrl?awayCtrl._subBoost:0));
      const hxg=1.4*Math.pow(chaosRatio(hp,ap),1.5)*hf.atk*af.def*1.06;
      const axg=1.4*Math.pow(chaosRatio(ap,hp),1.5)*af.atk*hf.def;
      if(Math.random()<hxg/90){hs++;if($("sc"))$("sc").textContent=`${hs} – ${as}`;push2(m,`<span class="goal">⚽ GOAL! ${home.name}</span> — ${logGoal(home,true)} ${rnd(COMM.goal)}`,"goal");}
      else if(Math.random()<axg/90){as++;if($("sc"))$("sc").textContent=`${hs} – ${as}`;push2(m,`<span class="goal">⚽ GOAL! ${away.name}</span> — ${logGoal(away,false)} ${rnd(COMM.goal)}`,"goal");}
      else if(Math.random()<0.10){const t=Math.random()<hxg/(hxg+axg)?home:away;if(t===home){stat.hShots++;stat.hOn++;}else{stat.aShots++;stat.aOn++;}push2(m,`<span class="danger">${t.name}</span> ${rnd(COMM.chance)}`,"danger");}
      else if(Math.random()<0.16){const t=Math.random()<.5?home:away;if(Math.random()<0.4){t===home?stat.hShots++:stat.aShots++;}push2(m,`${t.name} ${rnd(COMM.mid)}`);}
      while(paused) await sleep(60);
      if(!skip) await sleep(m%5===0?180:100);
    }
    if($("clk"))$("clk").textContent="FULL TIME";
    return finish(hs,as,push2);
  }

  async function finish(hs,as,pushFn){
    let resText,winner=null;
    const hq2=homeCtrl?homeCtrl._qbonus:0, aq2=awayCtrl?awayCtrl._qbonus:0;
    const hp=home.pw*(1+hq2), ap=away.pw*(1+aq2);
    if(group){apply(home,away,hs,as);
      resText=hs>as?`${home.name} take it`:as>hs?`${away.name} take it`:"Honours even";
    }else{
      if(hs>as)winner=home;else if(as>hs)winner=away;
      else{
        // ---- EXTRA TIME: play 91'..120' live ----
        if($("clk"))$("clk").textContent="EXTRA TIME";
        pushFn(90,`<span class="danger">Level after 90 — we go to extra time!</span>`,"danger");
        await sleep(skip?150:900);
        // slightly lower scoring rate in ET (tired legs, caution)
        const etScale=0.55;
        for(let m=91;m<=120;m++){
          curMin=m;if($("clk"))$("clk").textContent=`${m}' (ET)`;
          const hf=homeCtrl?FORM[homeCtrl._form]:FORM.balanced;
          const af=awayCtrl?FORM[awayCtrl._form]:FORM.balanced;
          const hpp=home.pw*(1+hq2+(homeCtrl?homeCtrl._subBoost:0));
          const app2=away.pw*(1+aq2+(awayCtrl?awayCtrl._subBoost:0));
          const hxg=1.4*Math.pow(chaosRatio(hpp,app2),1.5)*hf.atk*af.def*1.06*etScale;
          const axg=1.4*Math.pow(chaosRatio(app2,hpp),1.5)*af.atk*hf.def*etScale;
          if(Math.random()<hxg/90){hs++;if($("sc"))$("sc").textContent=`${hs} – ${as}`;pushFn(m,`<span class="goal">⚽ GOAL! ${home.name}</span> — ${logGoal(home,true)} ${rnd(COMM.goal)}`,"goal");}
          else if(Math.random()<axg/90){as++;if($("sc"))$("sc").textContent=`${hs} – ${as}`;pushFn(m,`<span class="goal">⚽ GOAL! ${away.name}</span> — ${logGoal(away,false)} ${rnd(COMM.goal)}`,"goal");}
          else if(Math.random()<0.08){const t=Math.random()<hxg/(hxg+axg)?home:away;pushFn(m,`<span class="danger">${t.name}</span> ${rnd(COMM.chance)}`,"danger");}
          else if(Math.random()<0.12){const t=Math.random()<.5?home:away;pushFn(m,`${t.name} ${rnd(COMM.mid)}`);}
          if(m===105 && hs===as){pushFn(105,`<span class="danger">Half time in extra time. Still ${hs}-${as}.</span>`,"danger");if(!skip)await sleep(500);}
          if(!skip) await sleep(m%5===0?180:100);
        }
        if($("clk"))$("clk").textContent="END OF EXTRA TIME";
        if(hs>as)winner=home;else if(as>hs)winner=away;
        else{
          // ---- PENALTY SHOOTOUT: live, kick by kick ----
          winner=await shootout(home,away,hp,ap,pushFn);
        }
      }
      resText=`${winner.name} go through`;
    }
    pushFn(90,`<strong>FT — ${home.name} ${hs}-${as} ${away.name}. ${resText}.</strong>`,"goal");
    await sleep(skip?150:600);
    // ---- POST-MATCH STATS PANEL ----
    // pad shot counts a touch so totals read like a real match; possession from xg share
    const hShots=stat.hShots+Math.round(Math.random()*4), aShots=stat.aShots+Math.round(Math.random()*4);
    const hOn=Math.min(hShots,stat.hOn+Math.round(Math.random()*2)), aOn=Math.min(aShots,stat.aOn+Math.round(Math.random()*2));
    const hpw=home.pw*(1+hq), apw=away.pw*(1+aq);
    let hPoss=Math.round(100*hpw/(hpw+apw)); hPoss=Math.max(35,Math.min(65,hPoss)); const aPoss=100-hPoss;
    const bar=(l,hv,av)=>`<div class="srow"><span class="sl">${hv}</span><span class="sm">${l}</span><span class="sr">${av}</span></div>`;
    app.innerHTML+=`<div class="statbox">
      <div class="sttitle">${home.flag} ${home.name} ${hs} – ${as} ${away.name} ${away.flag}</div>
      ${bar("Possession %",hPoss,aPoss)}
      ${bar("Shots",hShots,aShots)}
      ${bar("On target",hOn,aOn)}
    </div>`;
    app.innerHTML+=`<div class="row"><div class="spacer"></div><button class="btn" id="cont">Continue ▸</button></div>`;
    await new Promise(res=>$("cont").onclick=res);
    return winner;
  }

  // Live penalty shootout. Returns the winning team object.
  async function shootout(home,away,hp,ap,pushFn){
    if($("clk"))$("clk").textContent="PENALTIES";
    pushFn(120,`<span class="danger">🥅 It goes to penalties!</span>`,"danger");
    if(!skip) await sleep(800);
    // conversion odds: base 0.75, nudged a touch by team quality
    const oddH=Math.min(0.88,Math.max(0.62,0.75+(hp-ap)/600));
    const oddA=Math.min(0.88,Math.max(0.62,0.75+(ap-hp)/600));
    let ph=0,pa=0;
    // build a little scoreboard line in the feed area
    const board=()=>`<span class="pen-board">${home.flag} ${ph} — ${pa} ${away.flag}</span>`;
    // build an ordered list of distinct penalty takers for a team (stars first, then squad fillers)
    const buildTakers=(teamName)=>{
      const order=[];
      const stars=(STARS[teamName]||[]).slice();
      // designated takers: the team's known names first
      stars.forEach(s=>{if(!order.includes(s))order.push(s);});
      // fill up to a healthy pool with distinct generic squad names
      let guard=0;
      while(order.length<9 && guard<60){
        const n=rnd(SURNAMES);
        if(!order.includes(n))order.push(n);
        guard++;
      }
      return order;
    };
    const homeTakers=buildTakers(home.name), awayTakers=buildTakers(away.name);
    let hIdx=0, aIdx=0;
    const nextTaker=(isHome)=>{
      if(isHome){const t=homeTakers[hIdx%homeTakers.length];hIdx++;return t;}
      const t=awayTakers[aIdx%awayTakers.length];aIdx++;return t;
    };
    const takePen=async(team,odd,isHome)=>{
      const taker=nextTaker(isHome);
      const scored=Math.random()<odd;
      if(scored){isHome?ph++:pa++;}
      const tag=scored?`<span class="goal">✅ SCORED</span>`:`<span class="danger">❌ MISSED</span>`;
      pushFn("PK",`${team.flag} ${taker} — ${tag}. ${board()}`, scored?"goal":"danger");
      if(!skip) await sleep(650);
    };
    // best-of-5
    for(let r=0;r<5;r++){
      await takePen(home,oddH,true);
      if(clinched(ph,pa,r,true)) return shootEnd(ph>pa?home:away);
      await takePen(away,oddA,false);
      if(clinched(ph,pa,r,false)) return shootEnd(ph>pa?home:away);
    }
    // sudden death
    pushFn("PK",`<span class="danger">Sudden death!</span>`,"danger");
    if(!skip) await sleep(500);
    while(true){
      await takePen(home,oddH,true);
      await takePen(away,oddA,false);
      if(ph>pa) return shootEnd(home);
      if(pa>ph) return shootEnd(away);
    }
    function shootEnd(team){
      pushFn("PK",`<span class="goal">🏆 ${team.name} win the shootout ${ph}-${pa}!</span>`,"goal");
      return team;
    }
    // has the shootout been decided before all 5 are taken?
    function clinched(ph,pa,roundIdx,homeJustWent){
      const hTaken = roundIdx+1;
      const aTaken = homeJustWent ? roundIdx : roundIdx+1;
      const hR = 5-hTaken, aR = 5-aTaken;
      if(ph > pa+aR) return true;   // away can't catch up
      if(pa > ph+hR) return true;   // home can't catch up
      return false;
    }
  }
}

/* ============ KNOCKOUTS (R32 → Final) ============ */
function startKnockout(){
  let q=[],thirds=[];
  S.groups.forEach(g=>{const s=[...g].sort(cmp);q.push(s[0],s[1]);thirds.push(s[2]);});
  thirds.sort(cmp);q.push(...thirds.slice(0,8)); // 24 + 8 = 32
  for(let i=q.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[q[i],q[j]]=[q[j],q[i]];}
  S.bracket=q.map(t=>({name:t.name,flag:t.flag,pw:t.pw}));S.round=32;S.stage="ko";
  S.survivors=new Set(q.filter(t=>isHuman(t.name)).map(t=>t.name));
  // exit-round tracking for the finishing leaderboard (higher = further)
  // values: 0 groups, 32 R32, 16 R16, 8 QF, 4 SF, 2 Final(runner-up), 1 Champion
  S.exit={};
  const qualified=new Set(q.map(t=>t.name));
  S.groups.forEach(g=>g.forEach(t=>{if(!qualified.has(t.name))S.exit[t.name]=0;}));
  const go=()=>renderKO("32 teams. Single elimination. Win or go home.");
  S.mode==="hotseat"?handoff(S.players[0].name,"Knockout draw is in",go):go();
}
const ROUND_NAME={32:"Round of 32",16:"Round of 16",8:"Quarter-Finals",4:"Semi-Finals",2:"Final"};
function renderKO(msg){
  const b=S.bracket;
  let html=`<h2>${ROUND_NAME[S.round]}</h2><p class="lede">${msg||""}</p><div class="ko">`;
  for(let i=0;i<b.length;i+=2){
    const A=b[i],B=b[i+1];
    const both=isHuman(A.name)&&isHuman(B.name);
    const some=isHuman(A.name)||isHuman(B.name);
    const cls=both?"clash":some?"hum":"";
    const ta=isHuman(A.name)?` <span style="font-size:9px;color:var(--gold)">(${mgrName(A.name)})</span>`:"";
    const tb=isHuman(B.name)?` <span style="font-size:9px;color:var(--gold)">(${mgrName(B.name)})</span>`:"";
    html+=`<div class="tie ${cls}"><span>${A.flag} ${A.name}${ta}</span>
      <span class="res">${both?'<span class="badge">GRUDGE</span>':'v'}</span>
      <span>${B.name}${tb} ${B.flag}</span></div>`;
  }
  html+=`</div><div class="row"><button class="btn" id="play">Play ${ROUND_NAME[S.round]} ▸</button><div class="spacer"></div><button class="btn ghost sm" id="save">Save</button></div>`;
  app.innerHTML=html;$("play").onclick=()=>playKORound();
  $("save").onclick=()=>showSavePanel(()=>renderKO(msg));
}
async function playKORound(){
  const b=S.bracket,next=[];
  for(let i=0;i<b.length;i+=2){
    const A=b[i],B=b[i+1];
    let w;
    if(isHuman(A.name)||isHuman(B.name)){
      w=await liveMatch(A,B,{group:null,roundName:ROUND_NAME[S.round]});
      [A,B].forEach(t=>{if(isHuman(t.name)&&t.name!==w.name)S.survivors.delete(t.name);});
    }else w=koSim(A,B);
    next.push(w);
    // the loser exited at the current round value (32/16/8/4/2)
    const loser=(w.name===A.name)?B:A;
    S.exit[loser.name]=S.round;
  }
  S.bracket=next;
  if(S.round===2){
    // winner = champion (1), the beaten finalist already recorded exit=2 above
    S.exit[next[0].name]=1;
    champion(next[0]);return;
  }
  S.round/=2;
  const go=()=>renderKO("New round, fresh draw.");
  S.mode==="hotseat"?handoff(S.players[0].name,`${ROUND_NAME[S.round]} draw`,go):go();
}
function koSim(A,B){const pa=A.pw*(1+formNudge(A)),pb=B.pw*(1+formNudge(B));let[s1,s2]=quickScore(pa,pb);creditGoals(A.name,s1);creditGoals(B.name,s2);if(s1===s2)return Math.random()<pa/(pa+pb)?A:B;return s1>s2?A:B;}

// turn an exit value into a readable finishing-round label
function exitLabel(v){
  if(v===1)return "🏆 Champion";
  if(v===2)return "Runner-up";
  if(v===4)return "Semi-finals";
  if(v===8)return "Quarter-finals";
  if(v===16)return "Round of 16";
  if(v===32)return "Round of 32";
  return "Group stage";
}
// higher sort key = finished higher.
// exit values: 1 champion, 2 runner-up, 4 SF, 8 QF, 16 R16, 32 R32, 0 groups
function finishRank(v){
  const order={1:7,2:6,4:5,8:4,16:3,32:2,0:1};
  return order[v]!==undefined?order[v]:0;
}

function champion(w){
  S.stage="done";const wHuman=isHuman(w.name);

  // ---- Finishing leaderboard for the human managers ----
  const placings=S.players.map(p=>{
    const ev=(p.nation===w.name)?1:(S.exit[p.nation]!==undefined?S.exit[p.nation]:0);
    return {flag:NAT[p.nation].flag,mgr:p.name,nation:p.nation,ev};
  }).sort((a,b)=>finishRank(b.ev)-finishRank(a.ev));
  const medals=["🥇","🥈","🥉"];
  const leaderHtml=placings.map((pl,i)=>{
    const pos=medals[i]||`${i+1}.`;
    const champ=pl.ev===1;
    return `<div class="lbrow ${champ?'champ-row':''}">
      <span class="lbpos">${pos}</span>
      <span class="lbname">${pl.flag} ${pl.mgr} <span class="lbnat">(${pl.nation})</span></span>
      <span class="lbround">${exitLabel(pl.ev)}</span></div>`;
  }).join("");

  // ---- Golden Boot: top scorers across the whole tournament ----
  const boot=Object.entries(S.boot||{}).map(([k,goals])=>{
    const [player,team]=k.split("||");return {player,team,goals,flag:(NAT[team]?NAT[team].flag:"")};
  }).sort((a,b)=>b.goals-a.goals).slice(0,5);
  const bootHtml=boot.map((b,i)=>`<div class="lbrow">
      <span class="lbpos">${i===0?'👟':(i+1)+'.'}</span>
      <span class="lbname">${b.flag} ${b.player} <span class="lbnat">(${b.team})</span></span>
      <span class="lbround">${b.goals} ${b.goals===1?'goal':'goals'}</span></div>`).join("");

  // ---- Star man: the tournament's top scorer ----
  const star=boot[0];
  const starLine=star?`${star.flag} ${star.player} (${star.team}) — ${star.goals} goals`:"—";

  // ---- Shareable result card (plain text for group chats) ----
  const podium=placings.slice(0,3).map((pl,i)=>`${medals[i]} ${pl.mgr} — ${pl.nation} (${exitLabel(pl.ev).replace('🏆 ','')})`).join("\n");
  const card=
`🏆 WORLD CUP 2026 — FINAL RESULT 🏆
Champions: ${w.flag} ${w.name}${wHuman?` (managed by ${mgrName(w.name)})`:" (CPU)"}

Manager standings:
${podium}${placings.length>3?`\n…and ${placings.length-3} more`:""}

👟 Golden Boot: ${starLine}`;

  app.innerHTML=`<div class="champ">
    <div class="big">${wHuman?'🏆':w.flag}</div>
    <h2>${w.flag} ${w.name} — World Champions!</h2>
    <p class="lede">${wHuman?`${mgrName(w.name)} lifts the trophy. Bragging rights secured.`:`The CPU's ${w.name} spoiled the party — nobody in the room takes the glory.`}</p>
    <div class="lbtitle">⭐ Star Man of the Tournament</div>
    <div class="leaderboard"><div class="lbrow champ-row"><span class="lbpos">⭐</span><span class="lbname">${star?`${star.flag} ${star.player} <span class="lbnat">(${star.team})</span>`:'No goals recorded'}</span><span class="lbround">${star?star.goals+' goals':''}</span></div></div>
    <div class="lbtitle">Final Standings</div>
    <div class="leaderboard">${leaderHtml}</div>
    <div class="lbtitle">👟 Golden Boot</div>
    <div class="leaderboard">${bootHtml||'<div class="lbrow"><span class="lbname">No goals recorded</span></div>'}</div>
    <div class="row" style="justify-content:center"><button class="btn" id="share">📋 Copy Result Card</button><button class="btn ghost" id="again">New Tournament</button></div>
    <div class="toast" id="sharemsg" style="text-align:center"></div>
  </div>`;
  $("again").onclick=start;
  $("share").onclick=async()=>{
    try{await navigator.clipboard.writeText(card);$("sharemsg").textContent="Result card copied — paste it in your group chat!";}
    catch(e){
      // fallback: drop it in a textarea to copy manually
      const ta=document.createElement("textarea");ta.value=card;ta.style.cssText="width:100%;height:140px;margin-top:10px;font-family:var(--mono);font-size:11px;background:#06371f;color:var(--paper);border:2px solid var(--line);border-radius:4px;padding:8px";
      $("sharemsg").after(ta);ta.select();$("sharemsg").textContent="Select all and copy:";
    }
  };
}

/* ============ BOOT ============ */
start();
</script>
